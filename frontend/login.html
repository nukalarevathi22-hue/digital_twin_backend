<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - VirtuHeart</title>

  <!-- FONT AWESOME ICONS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      height: 100%;
      background-color: #25a59a;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('https://images.unsplash.com/photo-1580281657527-cee3fe3ff8a9?auto=format&fit=crop&w=1470&q=80')
        center center / cover no-repeat;
      opacity: 0.15;
      z-index: -1;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 50px 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      text-align: center;
      position: relative;
    }

    .login-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 5px;
      background: linear-gradient(135deg, #fa7f33, #25a59a);
    }

    .logo { font-size: 32px; font-weight: 700; margin-bottom: 30px; color: #25a59a; }
    .orange { color: #fa7f33; }

    h2 { font-size: 28px; margin-bottom: 10px; color: #168273; }
    p { color: #666; margin-bottom: 30px; }

    .user-type-selector {
      display: flex;
      margin-bottom: 25px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .user-type {
      flex: 1;
      padding: 15px;
      background: #f5f5f5;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }
    .user-type.active { background: #25a59a; color: white; }
    .user-type:first-child { border-right: 1px solid #ddd; }

    .form-group { margin-bottom: 20px; text-align: left; }
    label { font-weight: 600; color: #168273; margin-bottom: 8px; display: block; }
    input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: 0.3s ease;
    }
    input:focus { border-color: #25a59a; outline: none; }

    .login-btn {
      width: 100%; background: #fa7f33;
      color: white; border: none;
      padding: 16px; border-radius: 10px;
      font-size: 18px; font-weight: 600;
      cursor: pointer; margin-top: 10px;
      transition: 0.3s;
    }
    .login-btn:hover { background: #d96a00; }

    .forgot-password {
      display: block;
      margin-top: 20px;
      color: #25a59a;
      font-weight: 500;
      text-decoration: none;
    }

    /* SOCIAL ICON BUTTONS */
    .icon-btns {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 25px;
    }

    .icon-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 3px 12px rgba(0,0,0,0.18);
    }

    .icon-btn:hover {
      transform: scale(1.12);
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="login-card">

      <div class="logo">Virtu<span class="orange">Heart</span></div>
      <h2>Welcome Back</h2>
      <p>Sign in to access your personalized heart health dashboard</p>

      <!-- USER TYPE SWITCH -->
      <div class="user-type-selector">
        <button class="user-type active" data-type="patient">Patient</button>
        <button class="user-type" data-type="doctor">Doctor</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="Enter your password">
        </div>

        <button type="submit" class="login-btn">Sign In</button>
        <a href="#" class="forgot-password">Forgot your password?</a>
      </form>

      <!-- SOCIAL ICONS ONLY -->
      <div class="icon-btns">
        <div class="icon-btn" onclick="socialLogin('Google')">
          <i class="fab fa-google" style="color:#DB4437;"></i>
        </div>

        <div class="icon-btn" onclick="socialLogin('Facebook')">
          <i class="fab fa-facebook-f" style="color:#1877F2;"></i>
        </div>

        <div class="icon-btn" onclick="socialLogin('GitHub')">
          <i class="fab fa-github" style="color:black;"></i>
        </div>

        <div class="icon-btn" onclick="socialLogin('Apple')">
          <i class="fab fa-apple" style="color:black;"></i>
        </div>

        <div class="icon-btn" onclick="socialLogin('LinkedIn')">
          <i class="fab fa-linkedin-in" style="color:#0077B5;"></i>
        </div>
      </div>

    </div>
  </div>

  <script>
    let selectedUserType = "patient";

    document.querySelectorAll(".user-type").forEach(btn => {
      btn.addEventListener("click", function () {
        document.querySelectorAll(".user-type").forEach(b => b.classList.remove("active"));
        this.classList.add("active");
        selectedUserType = this.dataset.type;
      });
    });

    function socialLogin(provider) {
      alert(provider + " login clicked! (Connect OAuth backend)");
    }

    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const email = document.getElementById("email").value;

      localStorage.setItem("userType", selectedUserType);
      localStorage.setItem("userEmail", email);
      localStorage.setItem("isLoggedIn", "true");

      window.location.href =
  selectedUserType === "patient"
    ? "/dashboard?role=patient"
    : "/dashboard?role=doctor";

    });
  </script>

</body>
</html>
