<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VirtuHeart - Progressive Digital Twin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
header { padding:15px; background:#1e293b; text-align:center; font-size:20px; font-weight:bold; }
.container { padding:20px; }
button { padding:10px 20px; background:#2563eb; border:none; color:white; border-radius:6px; cursor:pointer; }
.dashboard { display:none; margin-top:20px; }
.metrics { display:flex; gap:20px; margin-bottom:20px; }
.metric-box { background:#1e293b; padding:15px; border-radius:10px; flex:1; text-align:center; }
.model-container { width:100%; height:500px; background:white; border-radius:10px; overflow:hidden; }
</style>
</head>

<body>

<header>VirtuHeart – Progressive MRI Digital Twin</header>

<div class="container">


<input type="file" id="mriUpload">
<button onclick="uploadAndAnalyzeMRI()">Upload MRI & Analyze</button>

<div class="dashboard" id="dashboard">


<div class="metrics">
    <div class="metric-box"><h3>EF</h3><p id="efValue">--</p></div>
    <div class="metric-box"><h3>Scar %</h3><p id="scarValue">--</p></div>
    <div class="metric-box"><h3>Region</h3><p id="defectRegionValue">--</p></div>
</div>

<div class="model-container">
<div id="heart-container" style="width:100%; height:100%;"></div>
</div>

</div>
</div>


<script>
let scene, camera, renderer, controls, heart;

window.onload = function(){
    initializeScene();
};

function initializeScene(){
    const container = document.getElementById("heart-container");
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf4f4f4);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/500, 0.1, 1000);
    camera.position.z = 4;

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth*0.8, 500);
    container.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    let light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5,5,5);
    scene.add(light);

    const loader = new THREE.GLTFLoader();
    loader.load("/static/models/heart.glb", function(gltf){
        heart = gltf.scene;
        heart.scale.set(2,2,2);
        scene.add(heart);
    });

    animate();
}

function uploadAndAnalyzeMRI(){
    const fileInput = document.getElementById("mriUpload");
    if(fileInput.files.length === 0){
        alert("Upload MRI file first");
        return;
    }
    const file = fileInput.files[0];
    const formData = new FormData();
    formData.append("file", file);

    fetch("/api/upload-mri", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if(data.error){
            alert("Error: " + data.error);
            return;
        }
        document.getElementById("efValue").innerText = data.ef + "%";
        document.getElementById("scarValue").innerText = data.scar + "%";
        document.getElementById("defectRegionValue").innerText = data.region;
        document.getElementById("dashboard").style.display = "block";
        highlightRegion(data.ventricle);
    })
    .catch(err => {
        alert("Failed to analyze MRI: " + err);
    });
}

function highlightRegion(region){
    if(!heart) return;
    heart.traverse(function(child){
        if(child.isMesh){
            child.material.color.set(0xff4444);
            if(region === "left_ventricle" && child.name && child.name.toLowerCase().includes("left")){
                child.material.color.set(0xffff00);
            }
            if(region === "right_ventricle" && child.name && child.name.toLowerCase().includes("right")){
                child.material.color.set(0xffff00);
            }
            if(region === "septal" && child.name && child.name.toLowerCase().includes("septum")){
                child.material.color.set(0xffff00);
            }
        }
    });
}

function animate(){
    requestAnimationFrame(animate);
    if(heart){
        heart.rotation.y += 0.01;
    }
    controls.update();
    renderer.render(scene, camera);
}
</script>

</body>
</html>
