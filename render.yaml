services:
  - type: web
    name: digital-twin-backend
    runtime: docker
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "https://digital-twin-backend-vfsn.onrender.com"
      - key: FITBIT_CLIENT_ID
        scope: run
      - key: FITBIT_CLIENT_SECRET
        scope: run
      - key: FITBIT_REDIRECT_URI
        scope: run
